name: Django DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  test-and-security:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      run: |
        pytest -v

    - name: Run Bandit Scan
      run: |
        bandit -r app drf -lll

    - name: Run Pip Audit
      run: |
        pip-audit

    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: p/security-audit

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build \
          --platform linux/amd64 \
          -t django-app:${{ github.sha }} .

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: django-app:${{ github.sha }}
        format: table
        severity: HIGH,CRITICAL
        exit-code: '0'

  deploy:

    name: Deploy to ECS

    needs: test-and-security

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build \
          --platform linux/amd64 \
          -t django-app:${{ github.sha }} .

    - name: Tag Docker Image
      run: |
        docker tag django-app:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Push Docker Image to ECR
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Update Latest Tag
      run: |
        docker tag \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Force ECS Deployment
      run: |
        aws ecs update-service \
          --cluster django-devsecops-cluster \
          --service django-service \
          --force-new-deployment

    - name: Wait For ECS Stability
      run: |
        aws ecs wait services-stable \
          --cluster django-devsecops-cluster \
          --services django-service

    - name: Deployment Success
      run: |
        echo "Application deployed successfully to ECS Fargate"